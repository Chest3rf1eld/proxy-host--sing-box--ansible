sing_box_package: sing-box
sing_box_service: sing-box
sing_box_config_dir: /etc/sing-box
sing_box_config_path: "{{ sing_box_config_dir }}/config.json"
sing_box_config_template: config.json.j2
sing_box_binary_path: /usr/bin/sing-box
sing_box_install_package: true
sing_box_install_method: auto
sing_box_manage_apt_repo: true
sing_box_apt_keyring_dir: /etc/apt/keyrings
sing_box_apt_key_path: "{{ sing_box_apt_keyring_dir }}/sagernet.asc"
sing_box_apt_key_url: https://sing-box.app/gpg.key
sing_box_apt_source_path: /etc/apt/sources.list.d/sagernet.sources
sing_box_apt_source_content: |
  Types: deb
  URIs: https://deb.sagernet.org/
  Suites: *
  Components: *
  Enabled: yes
  Signed-By: {{ sing_box_apt_key_path }}

sing_box_archive_version: 1.13.12
sing_box_archive_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64
  armv7l: armv7
  armv6l: armv6
sing_box_archive_arch: "{{ sing_box_archive_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
sing_box_archive_name: "sing-box-{{ sing_box_archive_version }}-linux-{{ sing_box_archive_arch }}"
sing_box_archive_url: "https://github.com/SagerNet/sing-box/releases/download/v{{ sing_box_archive_version }}/{{ sing_box_archive_name }}.tar.gz"
sing_box_archive_tmp_dir: "/tmp/{{ sing_box_archive_name }}"
sing_box_systemd_unit_path: "/etc/systemd/system/{{ sing_box_service }}.service"

# Runtime sing-box configuration is expected from inventory/group vars.
sing_box_config: {}
